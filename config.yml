name: Deploy Azure Function App
 
on:
  push:
    branches:
      - main
  workflow_dispatch:
 
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
 
    steps:
      - name: Checkout
        uses: actions/checkout@v4
 
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
 
      - name: Build
        run: dotnet build ./Group3RetailEcommercePrjct/Group3RetailEcommercePrjct.csproj --configuration Release
 
      - name: Publish
        run: dotnet publish ./Group3RetailEcommercePrjct/Group3RetailEcommercePrjct.csproj --configuration Release --output ./publish
 
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
 
      - name: Deploy to Azure Functions
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ secrets.AZURE_FUNCTIONAPP_NAME }}
          package: ./publish